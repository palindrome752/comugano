<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÇOMÜ GANO Hesaplayıcı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        comuBlue: '#003366',
                        comuLight: '#E6F0FA'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        @media (prefers-color-scheme: dark) {
            ::-webkit-scrollbar-thumb {
                background: #475569;
            }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        @media (prefers-color-scheme: dark) {
            .glass-panel {
                background: rgba(31, 41, 55, 0.95);
            }
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-comuBlue dark:bg-blue-950 text-white shadow-lg relative transition-colors duration-300 border-b-4 border-blue-400 dark:border-blue-800">
        <div class="absolute top-4 right-4 flex gap-2">
            <button onclick="setLanguage('tr')" class="px-3 py-1 text-sm bg-white/10 hover:bg-white/20 rounded font-medium transition">TR</button>
            <button onclick="setLanguage('en')" class="px-3 py-1 text-sm bg-white/10 hover:bg-white/20 rounded font-medium transition">EN</button>
        </div>
        <div class="container mx-auto px-4 py-10 max-w-4xl text-center">
            <h1 id="txtTitle" class="text-3xl md:text-4xl font-bold tracking-tight"></h1>
            <p id="txtSubtitle" class="mt-3 text-sm md:text-base text-blue-200 font-medium"></p>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">

        <div id="setup-screen" class="glass-panel rounded-2xl shadow-xl p-6 md:p-8 fade-in border border-gray-200 dark:border-gray-800 transition-colors duration-300">
            <div class="mb-8">
                <label id="lblCalcType" class="block text-gray-800 dark:text-gray-200 font-bold mb-3 text-lg"></label>
                <div class="flex space-x-8">
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="creditType" value="akts" checked class="form-radio h-5 w-5 text-comuBlue transition">
                        <span id="lblAkts" class="ml-2 text-gray-700 dark:text-gray-300 group-hover:text-comuBlue dark:group-hover:text-blue-400 font-medium transition"></span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="creditType" value="yerel" class="form-radio h-5 w-5 text-comuBlue transition">
                        <span id="lblYerel" class="ml-2 text-gray-700 dark:text-gray-300 group-hover:text-comuBlue dark:group-hover:text-blue-400 font-medium transition"></span>
                    </label>
                </div>
                <div id="localCreditWarning" class="hidden text-sm text-amber-700 dark:text-amber-300 mt-4 p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg shadow-sm">
                    <strong id="lblLocalWarn"></strong>
                </div>
            </div>

            <div class="mb-8">
                <label id="lblGradeMode" class="block text-gray-800 dark:text-gray-200 font-bold mb-3 text-lg"></label>
                <div class="flex space-x-8 items-center">
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="gradeMode" value="letter" checked class="form-radio h-5 w-5 text-comuBlue transition">
                        <span id="lblModeLetter" class="ml-2 text-gray-700 dark:text-gray-300 group-hover:text-comuBlue dark:group-hover:text-blue-400 font-medium transition"></span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="gradeMode" value="exam" class="form-radio h-5 w-5 text-comuBlue transition">
                        <span id="lblModeExam" class="ml-2 text-gray-700 dark:text-gray-300 group-hover:text-comuBlue dark:group-hover:text-blue-400 font-medium transition flex items-center"></span>
                    </label>
                </div>
            </div>

            <hr class="my-8 border-gray-100 dark:border-gray-700">

            <div class="mb-8">
                <label id="lblTargetSem" class="block text-gray-800 dark:text-gray-200 font-bold mb-3 text-lg"></label>
                <select id="targetSemester" class="w-full md:w-1/3 p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner"></select>
            </div>

            <div class="mb-8 bg-blue-50/50 dark:bg-gray-800/30 p-5 rounded-xl border border-blue-100 dark:border-gray-700 transition">
                <label class="flex items-center cursor-pointer mb-4 group">
                    <input type="checkbox" id="hasExistingGano" class="form-checkbox h-5 w-5 text-comuBlue rounded transition" onchange="toggleExistingInputs()">
                    <span id="lblHasExist" class="ml-3 font-bold text-gray-800 dark:text-gray-200 group-hover:text-comuBlue dark:group-hover:text-blue-400 transition"></span>
                </label>

                <div id="existingInputs" class="hidden grid grid-cols-1 md:grid-cols-3 gap-5 pt-2">
                    <div>
                        <label id="lblExistGano" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2"></label>
                        <input type="number" id="existGano" step="0.01" min="0" max="4" class="w-full p-3 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner">
                    </div>
                    <div>
                        <label id="lblExistCredit" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2"></label>
                        <input type="number" id="existCredit" step="0.5" min="0" class="w-full p-3 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner">
                    </div>
                    <div>
                        <label id="lblStartSem" class="block text-sm font-semibold text-gray-600 dark:text-gray-400 mb-2"></label>
                        <select id="startSemester" class="w-full p-3 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner"></select>
                    </div>
                </div>
            </div>

            <button id="btnStartApp" onclick="startApp()" class="w-full bg-comuBlue hover:bg-blue-800 active:transform active:scale-95 text-white font-bold py-4 px-4 rounded-xl transition-all duration-200 shadow-lg text-lg"></button>
        </div>

        <div id="semester-screen" class="hidden fade-in">
            <div class="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-md mb-6 border-l-4 border-comuBlue transition-colors duration-300">
                <h2 class="text-xl font-bold text-comuBlue dark:text-blue-400">
                    <span id="currentSemesterLabel">1</span><span id="lblSemInfo"></span>
                </h2>
                <div class="bg-gray-100 dark:bg-gray-700 px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 mt-3 md:mt-0 font-medium text-sm">
                    <span id="lblTargetSemLabel"></span>: <span id="targetSemesterLabel" class="font-bold text-gray-800 dark:text-white">8</span>
                </div>
            </div>

            <div class="glass-panel rounded-2xl shadow-xl p-4 md:p-6 border border-gray-200 dark:border-gray-800 transition-colors duration-300">
                <div class="flex flex-col gap-4 mb-6 pb-6 border-b border-gray-100 dark:border-gray-700">
                    <div>
                        <label id="lblCourseCount" class="block text-gray-700 dark:text-gray-300 text-sm font-bold mb-2"></label>
                        <div class="flex shadow-sm rounded-xl overflow-hidden border border-gray-300 dark:border-gray-600 w-full md:w-64">
                            <input type="number" id="courseCount" min="1" max="20" class="w-full p-3 bg-white dark:bg-gray-800 text-center focus:outline-none transition">
                            <button id="btnBatch" onclick="generateRowsFromInput()" class="bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-800/50 text-blue-700 dark:text-blue-300 font-bold px-6 transition border-l border-gray-300 dark:border-gray-600"></button>
                        </div>
                    </div>
                    <div id="repeatCountContainer" class="hidden mt-2 p-4 bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800 rounded-xl">
                        <label id="lblRepeatCount" class="block text-orange-800 dark:text-orange-300 text-sm font-bold mb-2"></label>
                        <div class="flex shadow-sm rounded-xl overflow-hidden border border-orange-300 dark:border-orange-600 w-full md:w-64">
                            <input type="number" id="repeatCount" min="0" max="20" placeholder="0" class="w-full p-3 bg-white dark:bg-gray-800 text-center focus:outline-none transition">
                            <button id="btnApplyRepeat" onclick="applyRepeated()" class="bg-orange-100 dark:bg-orange-800/50 hover:bg-orange-200 dark:hover:bg-orange-700/50 text-orange-800 dark:text-orange-200 font-bold px-6 transition border-l border-orange-300 dark:border-orange-600"></button>
                        </div>
                    </div>
                </div>

                <div id="courseContainer" class="space-y-4 mb-8"></div>

                <div class="flex flex-col-reverse md:flex-row justify-between items-center mt-10 pt-6 border-t border-gray-100 dark:border-gray-700 gap-4">
                    <button id="btnBack" onclick="goBack()" class="hidden w-full md:w-auto bg-gray-500 hover:bg-gray-600 active:transform active:scale-95 text-white font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow"></button>
                    <div class="flex-grow"></div>
                    <button id="btnCalculate" onclick="calculateSemester()" class="w-full md:w-auto bg-comuBlue hover:bg-blue-800 active:transform active:scale-95 text-white font-bold py-4 px-10 rounded-xl shadow-lg transition-all duration-200 text-lg"></button>
                </div>
            </div>
        </div>

        <div id="transcript-screen" class="hidden fade-in glass-panel rounded-2xl shadow-xl p-4 md:p-6 border border-gray-200 dark:border-gray-800 transition-colors duration-300">
            <h2 id="lblTranscriptTitle" class="text-2xl font-bold text-comuBlue dark:text-blue-400 mb-2 border-b border-gray-200 dark:border-gray-700 pb-4"></h2>
            <div id="transcriptWarning" class="bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-200 p-3 rounded-lg text-sm font-semibold mb-6 border border-blue-200 dark:border-blue-800"></div>
            <div id="transcriptContainer" class="space-y-10"></div>
            <div class="flex flex-col md:flex-row justify-between items-center mt-10 pt-6 border-t border-gray-100 dark:border-gray-700 gap-4">
                <button id="btnBackFromTranscript" onclick="switchScreen('semester-screen')" class="w-full md:w-auto bg-gray-500 hover:bg-gray-600 active:transform active:scale-95 text-white font-bold py-3 px-8 rounded-xl transition-all duration-200 shadow"></button>
                <div class="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                    <button id="btnRecalculate" onclick="saveTranscriptEdits()" class="w-full md:w-auto bg-amber-500 hover:bg-amber-600 active:transform active:scale-95 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all duration-200"></button>
                    <button id="btnPrintReal" onclick="printTranscript()" class="w-full md:w-auto bg-comuBlue hover:bg-blue-800 active:transform active:scale-95 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all duration-200"></button>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-gray-100 dark:bg-gray-950 text-gray-500 dark:text-gray-400 py-8 text-center mt-auto transition-colors duration-300 border-t border-gray-200 dark:border-gray-800">
        <p id="txtFooter" class="text-sm px-4 max-w-2xl mx-auto"></p>
        <div class="mt-6 flex flex-wrap justify-center items-center gap-6">
            <a href="https://ubys.comu.edu.tr/" target="_blank" class="text-sm font-semibold text-comuBlue dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition">ÜBYS</a>
            <button id="btnInfo" onclick="showInfo()" class="text-sm font-semibold text-comuBlue dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition"></button>
            <button id="btnCreateTranscript" onclick="openTranscript()" class="text-sm font-semibold text-green-600 dark:text-green-500 hover:text-green-800 dark:hover:text-green-400 transition"></button>
            <button id="btnClear" onclick="clearCache()" class="text-sm font-semibold text-red-600 dark:text-red-500 hover:text-red-800 dark:hover:text-red-400 transition"></button>
        </div>
    </footer>

    <div id="customModal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden transition-colors duration-300 border border-gray-100 dark:border-gray-700 flex flex-col max-h-[90vh] relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white hover:text-gray-200 text-xl font-bold transition z-10">&times;</button>
            <div id="modalHeader" class="bg-comuBlue p-5 text-white font-bold text-xl flex-shrink-0">
                <span id="modalTitle"></span>
            </div>
            <div id="modalBody" class="p-6 md:p-8 text-gray-700 dark:text-gray-300 text-base leading-relaxed overflow-y-auto flex-grow"></div>
            <div class="bg-gray-50 dark:bg-gray-900 p-5 border-t border-gray-100 dark:border-gray-700 flex justify-end flex-shrink-0 gap-3" id="modalFooter">
                <button id="modalActionBtn" class="bg-comuBlue hover:bg-blue-800 active:transform active:scale-95 text-white font-bold py-2.5 px-8 rounded-xl transition-all shadow-sm"></button>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            tr: {
                title: "ÇOMÜ GANO Hesaplayıcı",
                subtitle: "Lisans Dönemi Ortalama Hesaplama Aracı",
                calcType: "Kredi Türü",
                aktsTitle: "AKTS",
                yerelTitle: "Yerel Kredi",
                localWarn: "ÇOMÜ'de güncel olarak AKTS sistemi kullanılmaktadır.",
                gradeMode: "Not Giriş Türü",
                modeLetter: "Harf Notu",
                modeExam: 'Vize ve Final Notu <span class="text-[10px] bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 px-2 py-0.5 rounded ml-2 uppercase font-bold">Detaylı</span>',
                targetSem: "Hesaplanacak Dönem",
                hasExist: "Mevcut bir GANO'm var (Bu seçenek seçilmezse 1. yarıyıldan itibaren başlar.)",
                existGano: "Mevcut GANO",
                existCredit: "Toplam AKTS",
                startSem: "Hesaplamaya Başlanılacak Dönem",
                btnStart: "Hesaplamaya Başla",
                semInfo: ". Yarıyıl Bilgileri",
                courseCount: "Bu dönem alınan ders sayısı:",
                placeholderCount: "Sayı giriniz",
                btnAddBatch: "Ekle",
                repeatCountLbl: "Tekrar alınan ders sayısını giriniz:",
                btnApply: "Uygula",
                colName: "Ders Adı",
                colGrade: "Harf Notu",
                prevGradeLbl: "Geçmiş Not",
                selectMsg: "Seçiniz",
                btnBack: "Önceki Yarıyıl",
                btnCalcSem: "Yarıyılı Hesapla ve İlerle",
                btnCalcBut: "Bütünlemeleri Hesapla ve İlerle",
                btnFinish: "Sonuçları Gör ve Bitir",
                btnFinishBut: "Bütünlemeleri Hesapla ve Bitir",
                footerText: "Bu araç öğrenciler tarafından öğrenciler için hazırlanmış olup, resmi bağlayıcılığı yoktur. Resmi veriler için Çanakkale Onsekiz Mart Üniversitesinin öğrenci bilgi sistemini kontrol ediniz.",
                btnInfo: "Ek Bilgi",
                btnCreateTranscript: "Transkript Önizlemesi Oluştur",
                btnPrintReal: "Transkript Önizlemesi Yazdır",
                btnRecalculate: "Yeniden Hesapla",
                btnBackFromTranscript: "Geri Dön",
                transcriptTitle: "Düzenlenebilir Transkript Önizlemesi",
                transcriptWarn: "Transkript yazdırmak için 1. yarıyıldan başlamanız önerilir.",
                btnClear: "Sayfayı Sıfırla",
                btnClose: "Kapat",
                btnSave: "Kaydet",
                btnCancel: "İptal",
                modalTitleResult: "Sonuç",
                summarySem: "Bu Yarıyıl Özeti",
                summaryTotal: "YANO'ya Etki Eden",
                summaryYano: "YANO (Yarıyıl Ort.):",
                summaryGen: "Genel Durum",
                summaryGenTotal: "Genel Toplam",
                summaryGano: "GANO (Genel Ort.):",
                btnNextSem: "Sonraki Yarıyıla Geç",
                btnHome: "Ana Sayfaya Dön",
                errMissing: "Eksik Bilgi",
                errMissingMsg: "Lütfen mevcut GANO ve AKTS bilgilerini eksiksiz girin.",
                errGano: "Hata",
                errGanoMsg: "GANO 0.00 ile 4.00 arasında olmalıdır.",
                errCreditMsg: "Tamamlanan miktar 0'dan büyük olmalıdır.",
                errSemMsg: "Hesaplanacak son yarıyıl, ilk yarıyıldan daha küçük olamaz.",
                errRowMsg: "Lütfen AKTS ve gerekli not alanlarını doldurun.",
                errRowCreditMsg: "Kredi/AKTS değeri sıfırdan büyük olmalıdır.",
                errZeroCreditMsg: "Toplam dönem miktarı sıfır olamaz.",
                errInvalidExam: "Sınav notları 0 ile 100 arasında olmalıdır.",
                errSumMsg: "Etkinliklerin ve finalin ağırlık toplamı %100 olmalıdır.",
                errPrevGradeMsg: "Lütfen tekrar edilen dersler için geçmiş dönem harf notunu seçiniz.",
                infoTitle: "Ek Bilgi ve Yönetmelik",
                infoBody: `
                    <div class="space-y-6">
                        <div class="bg-blue-50 dark:bg-blue-900/20 p-5 rounded-xl border border-blue-100 dark:border-blue-800">
                            <h4 class="font-bold text-comuBlue dark:text-blue-400 mb-3 text-lg">MADDE 26 – Başarı Notu</h4>
                            <p class="text-sm mb-4">100 puan üzerinden verilen dönem içi eğitim öğretim etkinliklerinden (ara sınav/sınavlar, uygulama, staj, seminer, proje, ödev, laboratuvar vb.) alınan notların ortalamasının %40'ı ve yarıyıl sonu veya bütünleme sınav notunun %60'ı alınıp toplanarak öğrencinin başarı notu hesaplanır. "Başarı Notu Değerlendirme Tablosu"na göre Harf Notu ve AKTS notu verilir.</p>
                            <div class="grid grid-cols-3 sm:grid-cols-5 gap-3">
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">AA: 4.0</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">BA: 3.5</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">BB: 3.0</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">CB: 2.5</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">CC: 2.0</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">DC: 1.5</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">DD: 1.0</div>
                                <div class="bg-white dark:bg-gray-800 p-2 text-center rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 text-sm font-semibold">FD: 0.5</div>
                                <div class="bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400 p-2 text-center rounded-lg shadow-sm border border-red-100 dark:border-red-800 text-sm font-semibold">FF: 0.0</div>
                                <div class="bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400 p-2 text-center rounded-lg shadow-sm border border-red-100 dark:border-red-800 text-sm font-semibold">DZ: 0.0</div>
                            </div>
                            <p class="text-sm mt-4">Kredisiz olan dersler ile stajların devamsızlık ve başarı değerlendirmelerinde; (YE) yeterli, (YS) yetersiz, (DS) devamsız sayılır. Tekrar edilen derslerde alınan son başarı notu geçerlidir. Bir dersin devam koşulunu bir kez yerine getiren öğrencilerin bu dersi tekrar almaları durumunda devam koşulu aranmaz.</p>
                            <p class="text-sm mt-2">Bir dersten başarılı sayılabilmek için diğer şartlara ek olarak o dersin yarıyıl sonu veya bütünleme sınavından en az 50 puan almak gerekir, bu puanı alamayan öğrencilerin başarı notu 40'ın altında ise FF, 40 ve üzerinde ise FD harf notu olarak takdir edilir.</p>
                            <p class="text-sm mt-2">Başarı notu değerlendirme tablosuna göre kredili bir dersten bir öğrenci; a) (AA), (BA), (BB), (CB) veya (CC) notlarından birini almış ise o dersi başarmış sayılır. b) (DC) veya (DD) notlarından birini almış ve GNO’su 2.00 ve üzeri ise koşullu başarılı sayılır. c) (DC) veya (DD) notlarından birini almış ve GNO’su 2.00’ın altında ise koşullu başarısız sayılır. ç) (FD) ve (FF) notlarından birini almış ise başarısız sayılır. d) Derse devam koşulunu yerine getirmediyse devamsız (DS) sayılır. e) Kredisiz olan dersler ile stajların devamsızlık ve başarı değerlendirmelerinde; (YE) yeterli, (YS) yetersiz, (DS) devamsız sayılır. f) Öğrencinin girmeyi hak etmediği bir sınava girmesi sonucunda aldığı not iptal edilir.</p>
                        </div>
                        <div class="bg-emerald-50 dark:bg-emerald-900/20 p-5 rounded-xl border border-emerald-100 dark:border-emerald-800">
                            <h4 class="font-bold text-emerald-800 dark:text-emerald-400 mb-2 text-lg">MADDE 28 – Genel Not Ortalaması ve Dönem Not Ortalaması</h4>

        function updateDynamicLabels() {

                document.getElementById('lblExistCredit').innerHTML = `Total ${typeStr} (As of Semester ${prev})`;
            }
        }

        function populateSemesters() {
            const targetSelect = document.getElementById('targetSemester');
            const startSelect = document.getElementById('startSemester');
            const targetVal = targetSelect.value;
            const startVal = startSelect.value;

            targetSelect.innerHTML = '';
            startSelect.innerHTML = '';

            for (let year = 1; year <= 4; year++) {
                const groupTarget = document.createElement('optgroup');
                const groupStart = document.createElement('optgroup');
                const label = lang === 'tr' ? `${year}. Sınıf` : `Year ${year}`;
                groupTarget.label = label;
                groupStart.label = label;

                for (let s = (year - 1) * 2 + 1; s <= year * 2; s++) {
                    const optT = document.createElement('option');
                    optT.value = s;
                    optT.innerHTML = lang === 'tr' ? `${s}. Yarıyıl` : `Semester ${s}`;
                    groupTarget.appendChild(optT);

                    if (s > 1) {
                        const optS = document.createElement('option');
                        optS.value = s;
                        optS.innerHTML = lang === 'tr' ? `${s}. Yarıyıl` : `Semester ${s}`;
                        groupStart.appendChild(optS);
                    }
                }
                targetSelect.appendChild(groupTarget);
                startSelect.appendChild(groupStart);
            }

            if (targetVal) {
                targetSelect.value = targetVal;
            } else {
                targetSelect.value = state.targetSemester;
            }

            if (startVal) {
                startSelect.value = startVal;
            } else if (state.startSemester > 1) {
                startSelect.value = state.startSemester;
            } else {
                startSelect.value = 2;
            }
        }

        function onTargetSemesterChange() {
            const targetVal = parseInt(document.getElementById('targetSemester').value);
            const startSelect = document.getElementById('startSemester');
            
            if (targetVal > 1) {
                startSelect.value = targetVal;
            } else {
                startSelect.value = 2;
            }
            
            updateDynamicLabels();
            saveSetupState();
        }

        function onStartSemesterChange() {
            updateDynamicLabels();
            saveSetupState();
        }

            document.getElementById('targetSemester').addEventListener('change', onTargetSemesterChange);
            document.getElementById('startSemester').addEventListener('change', onStartSemesterChange);

            document.querySelectorAll('input[name="creditType"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    state.creditType = e.target.value;

                    if (state.creditType === 'yerel') {

                        btn.disabled = true;
                        btn.classList.add('opacity-50', 'cursor-not-allowed');

                    updateDynamicLabels();
                    saveSetupState();

                loadCurrentCourses();
                renderSemesterCourses();
                updateSemesterUI();
            }

            const container = document.getElementById('existingInputs');
            
            if (isChecked) {
                container.classList.remove('hidden');
                const targetVal = document.getElementById('targetSemester').value;
                if (targetVal > 1) {
                    document.getElementById('startSemester').value = targetVal;
                }
                updateDynamicLabels();
            } else {
                container.classList.add('hidden');
            }
            
            state.hasExisting = isChecked;
            saveSetupState();

        function saveSetupState() {
            state.targetSemester = parseInt(document.getElementById('targetSemester').value);
            state.startSemester = document.getElementById('hasExistingGano').checked ? parseInt(document.getElementById('startSemester').value) : 1;
            state.baseGano = parseFloat(document.getElementById('existGano').value) || 0;
            state.baseCredits = parseFloat(document.getElementById('existCredit').value) || 0;
            
            try {
                if (window.localStorage) {
                    localStorage.setItem('gano_state', JSON.stringify(state));
                }
            } catch (e) {}
        }

        function restoreSetupState() {
            document.querySelector(`input[name="creditType"][value="${state.creditType}"]`).checked = true;
            document.querySelector(`input[name="gradeMode"][value="${state.gradeMode}"]`).checked = true;

            document.getElementById('targetSemester').value = state.targetSemester;
            document.getElementById('hasExistingGano').checked = state.hasExisting;
            document.getElementById('existGano').value = state.baseGano || '';
            document.getElementById('existCredit').value = state.baseCredits || '';

            if (state.hasExisting && state.startSemester > 1) {
                document.getElementById('startSemester').value = state.startSemester;
            } else {
                document.getElementById('startSemester').value = 2;
            }

            toggleExistingInputs();
            
            const btn = document.getElementById('btnStartApp');
            if (state.creditType === 'yerel') {
                document.getElementById('localCreditWarning').classList.remove('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');

            updateDynamicLabels();

                if (window.localStorage) {
                    localStorage.removeItem('gano_state');

                credit: '',

                if (state.baseGano < 0 || state.baseGano > 4) {

                if (state.baseCredits <= 0) {
                    showModal(t('errGano'), t('errCreditMsg'), true);

                state.baseGano = 0.0;

            syncDOMToCurrentCourses();
            const rcStr = document.getElementById('repeatCount').value;
            const rc = rcStr ? parseInt(rcStr) : 0;
            
            for (let i = 0; i < currentCourses.length; i++) {

        function calculateCourseRaw(c) {
            if (c.mode === 'letter') return null;
            
            let termScore = 0;
            c.activities.forEach(a => {
                const v = a.score !== '' ? parseFloat(a.score) : 0;
                termScore += v * (a.weight / 100);
            });
            
            const fScore = c.finalScore !== '' ? parseFloat(c.finalScore) : 0;
            const bScore = c.butScore !== '' ? parseFloat(c.butScore) : fScore;
            const examScoreToUse = (c.showBut && c.butScore !== '') ? bScore : fScore;

            return Math.round(termScore + examScoreToUse * (c.finalWeight / 100));
        }

        function getGradeFromRaw(raw) {
            let r = Math.round(raw);
            if (r >= 90) return 'AA';
            if (r >= 85) return 'BA';
            if (r >= 80) return 'BB';
            if (r >= 70) return 'CB';
            if (r >= 60) return 'CC';
            if (r >= 55) return 'DC';
            if (r >= 50) return 'DD';
            if (r >= 40) return 'FD';
            return 'FF';
        }

        function calculateCourseResult(c, raw) {
            if (c.mode === 'letter') return c.grade;
            
            const fScore = c.finalScore !== '' ? parseFloat(c.finalScore) : 0;
            const bScore = c.butScore !== '' ? parseFloat(c.butScore) : fScore;
            const examScoreToUse = (c.showBut && c.butScore !== '') ? bScore : fScore;

            if (examScoreToUse < 50) {
                return raw >= 40 ? 'FD' : 'FF';
            }
            return getGradeFromRaw(raw);
        }

        function calculateSemesterLogic(courseList, currentSem, historyState, baseGano, baseCredits) {
            let provisionalCredits = baseCredits;
            let provisionalPoints = baseCredits * baseGano;

            for (let s = 1; s < currentSem; s++) {
                if (historyState[s]) {
                    historyState[s].courses.forEach(c => {
                        provisionalCredits += c.credit;
                        provisionalPoints += c.credit * GRADES[c.grade];
                    });
                }
            }

            courseList.forEach(c => {
                if (c.isRepeated && c.prevGrade && GRADES[c.prevGrade] !== undefined) {
                    provisionalCredits -= c.credit;
                    provisionalPoints -= c.credit * GRADES[c.prevGrade];
                }
            });

            courseList.forEach(c => {
                provisionalCredits += c.credit;
                let courseGrade = c.grade;
                if (c.mode === 'exam') {
                    const raw = calculateCourseRaw(c);
                    courseGrade = calculateCourseResult(c, raw);
                }
                provisionalPoints += c.credit * GRADES[courseGrade];
            });

            const predictedGano = provisionalCredits > 0 ? (provisionalPoints / provisionalCredits) : 2.00;
            const passingScoreThreshold = predictedGano < 2.00 ? 60 : 50;

            let anyFailed = false;

            courseList.forEach(c => {
                if (c.mode === 'exam') {
                    c.raw = calculateCourseRaw(c);
                    c.grade = calculateCourseResult(c, c.raw);
                }
            });

            courseList.forEach(c => {
                if (c.mode === 'exam') {
                    const isFailed = c.grade === 'FF' || c.grade === 'FD';
                    const isConditionallyFailed = (c.grade === 'DC' || c.grade === 'DD') && predictedGano < 2.00;

                    if ((isFailed || isConditionallyFailed) && !c.showBut) {
                        c.showBut = true;
                        anyFailed = true;
                    }
                }
            });

            return { anyFailed };
        }

        function goBack() {
            syncDOMToCurrentCourses();
            
            if (currentCourses.length > 0) {
                state.history[state.currentSemester] = { courses: JSON.parse(JSON.stringify(currentCourses)) };
            }
            
            if (state.currentSemester > state.startSemester) {
                state.currentSemester--;
                state.awaitingButunleme = false;
                loadCurrentCourses();
                renderSemesterCourses();
                updateSemesterUI();
            }
        }

        function calculateSemester() {
            syncDOMToCurrentCourses();
            
            if (currentCourses.length === 0) return;

            let hasError = false;
            
            currentCourses.forEach((c) => {
                if (c.credit === '' || isNaN(c.credit) || c.credit <= 0) {
                    showModal(t('errGano'), t('errRowCreditMsg'), true);
                    hasError = true;
                    return;
                }
                if (c.isRepeated && !c.prevGrade) {
                    showModal(t('errGano'), t('errPrevGradeMsg'), true);
                    hasError = true;
                    return;
                }
                if (c.mode === 'letter' && !c.grade) {
                    showModal(t('errMissing'), t('errRowMsg'), true);
                    hasError = true;
                    return;
                } else if (c.mode === 'exam') {
                    if (c.finalScore === '') {
                        showModal(t('errMissing'), t('errRowMsg'), true);
                        hasError = true;
                        return;
                    }
                    
                    let allExamsValid = true;
                    c.activities.forEach(a => {
                        if (a.score !== '' && (a.score < 0 || a.score > 100)) {
                            allExamsValid = false;
                        }
                    });
                    
                    if (c.finalScore < 0 || c.finalScore > 100) allExamsValid = false;
                    if (c.butScore !== '' && (c.butScore < 0 || c.butScore > 100)) allExamsValid = false;
                    
                    if (!allExamsValid) {
                        showModal(t('errGano'), t('errInvalidExam'), true);
                        hasError = true;
                        return;
                    }
                }
            });

            if (hasError) return;

            const calcLogic = calculateSemesterLogic(currentCourses, state.currentSemester, state.history, state.baseGano, state.baseCredits);

            if (calcLogic.anyFailed) {
                state.awaitingButunleme = true;
                renderSemesterCourses();
                updateSemesterUI();
                showModal("Bütünleme", t('butunlemeFillMsg'), false, null, t('btnClose'));
                return;
            }

            let semCredits = 0;
            let semPoints = 0;
            let totalSemCredits = 0;

            currentCourses.forEach(c => {
                totalSemCredits += c.credit;
                if (!c.isRepeated) {
                    semCredits += c.credit;
                    semPoints += c.credit * GRADES[c.grade];
                }
            });

            if (totalSemCredits === 0) {
                showModal(t('errGano'), t('errZeroCreditMsg'), true);
                return;
            }

            state.history[state.currentSemester] = { courses: JSON.parse(JSON.stringify(currentCourses)) };
            state.awaitingButunleme = false;
            
            try {
                if (window.localStorage) {
                    localStorage.setItem('gano_state', JSON.stringify(state));
                }
            } catch (e) {}

            let cumCredits = state.baseCredits;
            let cumPoints = state.baseCredits * state.baseGano;

            for (let sem = state.startSemester; sem <= state.currentSemester; sem++) {
                if (state.history[sem]) {
                    state.history[sem].courses.forEach(c => {
                        if (c.isRepeated && c.prevGrade && GRADES[c.prevGrade] !== undefined) {
                            cumCredits -= c.credit;
                            cumPoints -= c.credit * GRADES[c.prevGrade];
                        }
                        cumCredits += c.credit;
                        cumPoints += c.credit * GRADES[c.grade];
                    });
                }
            }

            const yanoRounded = semCredits > 0 ? (Math.round((semPoints / semCredits) * 100) / 100).toFixed(2) : '-';
            const gano = cumCredits > 0 ? (cumPoints / cumCredits) : 0;
            const ganoRounded = (Math.round(gano * 100) / 100).toFixed(2);
            let ganoDisp = state.currentSemester === 1 ? "-" : ganoRounded;
            const cType = state.creditType === 'akts' ? t('aktsTitle') : t('yerelTitle');

            let resultHTML = `
                <div class="mb-6 bg-blue-50 dark:bg-blue-900/20 p-5 rounded-xl border border-blue-100 dark:border-blue-800">
                    <h3 class="font-bold text-comuBlue dark:text-blue-400 border-b border-blue-200 dark:border-blue-700 pb-3 mb-3 text-lg">${t('summarySem')}</h3>
                    <div class="flex justify-between mb-2 text-gray-700 dark:text-gray-300 font-medium"><span>${t('summaryTotal')} ${cType}:</span> <strong class="text-gray-900 dark:text-white">${semCredits.toFixed(1)}</strong></div>
                    <div class="flex justify-between text-gray-700 dark:text-gray-300 font-medium items-center"><span>${t('summaryYano')}</span> <strong class="text-2xl text-blue-600 dark:text-blue-400">${yanoRounded}</strong></div>
                </div>
                <div class="bg-emerald-50 dark:bg-emerald-900/20 p-5 rounded-xl border border-emerald-100 dark:border-emerald-800">
                    <h3 class="font-bold text-emerald-800 dark:text-emerald-400 border-b border-emerald-200 dark:border-emerald-700 pb-3 mb-3 text-lg">${t('summaryGen')}</h3>
                    <div class="flex justify-between mb-2 text-gray-700 dark:text-gray-300 font-medium"><span>${t('summaryGenTotal')} ${cType}:</span> <strong class="text-gray-900 dark:text-white">${cumCredits.toFixed(1)}</strong></div>
                    <div class="flex justify-between text-gray-700 dark:text-gray-300 font-medium items-center"><span>${t('summaryGano')}</span> <strong class="text-3xl text-green-600 dark:text-green-400">${ganoDisp}</strong></div>
                </div>
            `;

            renderSemesterCourses();

            if (state.currentSemester < state.targetSemester) {
                showModal(t('modalTitleResult'), resultHTML, false, () => {
                    state.currentSemester++;
                    loadCurrentCourses();
                    renderSemesterCourses();
                    updateSemesterUI();
                }, t('btnNextSem'));
            } else {
                resultHTML += `<div class="mt-8 text-center text-white bg-green-600 p-3 rounded-xl font-bold shadow-md text-lg">${t('successMsg')}</div>`;
                showModal(t('modalTitleResult'), resultHTML, false, () => {
                    switchScreen('setup-screen');
                }, t('btnHome'));
            }
        }

        function switchScreen(screenId) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('semester-screen').classList.add('hidden');
            document.getElementById('transcript-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function openTranscript() {
            if (!document.getElementById('semester-screen').classList.contains('hidden')) {
                syncDOMToCurrentCourses();
                
                if (currentCourses.length > 0) {
                    state.history[state.currentSemester] = { courses: JSON.parse(JSON.stringify(currentCourses)) };
                    
                    try {
                        if (window.localStorage) {
                            localStorage.setItem('gano_state', JSON.stringify(state));
                        }
                    } catch (e) {}
                }
            }
            switchScreen('transcript-screen');
            renderTranscript();
        }

        function saveTranscriptStateSilently() {
            for (let s = state.startSemester; s <= state.targetSemester; s++) {
                if (!state.history[s] || state.history[s].courses.length === 0) continue;
                
                const rows = document.querySelectorAll(`.transcript-row-${s}`);
                if (rows.length === 0) continue;

                rows.forEach((row, idx) => {
                    const c = state.history[s].courses[idx];
                    const cred = row.querySelector('.inp-credit').value;
                    c.credit = cred !== '' ? parseFloat(cred.replace(',', '.')) : '';

                    let nameVal = row.querySelector('.inp-name').value.trim();
                    if (nameVal === '' && c.credit !== '') {
                        const isAkts = state.creditType === 'akts';
                        if (lang === 'tr') {
                            nameVal = isAkts ? `${c.credit} AKTS'li Ders` : `${c.credit} Kredilik Ders`;
                        } else {
                            nameVal = isAkts ? `${c.credit} ECTS Course` : `${c.credit} Credit Course`;
                        }
                        row.querySelector('.inp-name').value = nameVal;
                    }
                    c.name = nameVal;

                    if (c.mode === 'letter') {
                        c.grade = row.querySelector('.inp-grade').value;
                    } else {
                        c.activities.forEach(a => {
                            const val = row.querySelector(`.inp-act-${a.id}`).value;
                            a.score = val !== '' ? parseFloat(val) : '';
                        });
                        
                        const fVal = row.querySelector('.inp-final').value;
                        c.finalScore = fVal !== '' ? parseFloat(fVal) : '';
                        
                        if (c.showBut) {
                            const bVal = row.querySelector('.inp-but').value;
                            c.butScore = bVal !== '' ? parseFloat(bVal) : '';
                        }
                    }
                });
            }
            
            try {
                if (window.localStorage) {
                    localStorage.setItem('gano_state', JSON.stringify(state));
                }
            } catch (e) {}
        }

        function renderTranscript() {
            const container = document.getElementById('transcriptContainer');
            container.innerHTML = '';
            const cType = state.creditType === 'akts' ? t('aktsTitle') : t('yerelTitle');

            let hasData = false;
            for (let s = state.startSemester; s <= state.targetSemester; s++) {
                if (!state.history[s] || state.history[s].courses.length === 0) continue;
                hasData = true;

                let html = `
                    <div class="bg-gray-50 dark:bg-gray-800/50 p-4 md:p-6 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
                        <h3 class="font-bold text-lg text-comuBlue dark:text-blue-400 mb-4 border-b border-gray-200 dark:border-gray-600 pb-2">${t('semPrefix')}${s}${t('semSuffix')}</h3>
                        <div class="transcript-courses-${s} space-y-4"></div>
                    </div>
                `;

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                container.appendChild(tempDiv.firstChild);

                const courseCont = container.querySelector(`.transcript-courses-${s}`);

                state.history[s].courses.forEach((c, idx) => {
                    const row = document.createElement('div');
                    row.className = `transcript-row-${s} bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm flex flex-col md:flex-row gap-4 items-start md:items-center`;

                    let rowHtml = `
                        <div class="hidden md:flex flex-shrink-0 w-8 justify-center font-bold text-gray-400 dark:text-gray-500">${idx+1}</div>
                        <div class="w-full md:w-1/3 flex-shrink-0">
                            <label class="md:hidden block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase">${t('colName')}</label>
                            <input type="text" class="inp-name w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner" value="${c.name || ''}">
                        </div>
                        <div class="w-full md:w-20 flex-shrink-0">
                            <label class="md:hidden block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase">${cType}</label>
                            <input type="number" step="0.5" min="0" class="inp-credit w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-comuBlue md:text-center transition shadow-inner" value="${c.credit || ''}">
                        </div>
                        <div class="w-full flex-grow flex flex-wrap gap-2 items-center">
                    `;

                    if (c.mode === 'letter') {
                        let gradeOptions = `<option value="" disabled selected>${t('selectMsg')}</option>`;
                        for (const grade in GRADES) {
                            const sel = c.grade === grade ? 'selected' : '';
                            gradeOptions += `<option value="${grade}" ${sel}>${grade}</option>`;
                        }
                        
                        rowHtml += `
                            <div class="flex-grow md:max-w-[150px]">
                                <label class="md:hidden block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1 uppercase">${t('colGrade')}</label>
                                <select class="inp-grade w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-comuBlue transition shadow-inner">
                                    ${gradeOptions}
                                </select>
                            </div>
                        `;
                    } else {
                        c.activities.forEach(a => {
                            rowHtml += `
                                <div class="w-20 flex-shrink-0">
                                    <label class="text-[10px] uppercase truncate block text-gray-500 dark:text-gray-400 font-bold mb-1" title="${a.name}">${a.name} <span class="font-normal">%${a.weight}</span></label>
                                    <input type="number" min="0" max="100" class="inp-act-${a.id} w-full p-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-comuBlue text-center shadow-inner transition" value="${a.score !== '' ? a.score : ''}">
                                </div>
                            `;
                        });
                        
                        rowHtml += `
                            <div class="w-20 flex-shrink-0">
                                <label class="text-[10px] uppercase truncate block text-gray-500 dark:text-gray-400 font-bold mb-1" title="Final">FİNAL <span class="font-normal">%${c.finalWeight}</span></label>
                                <input type="number" min="0" max="100" class="inp-final w-full p-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-comuBlue text-center shadow-inner transition" value="${c.finalScore !== '' ? c.finalScore : ''}">
                            </div>
                        `;
                        
                        if (c.showBut) {
                            rowHtml += `
                                <div class="w-20 flex-shrink-0">
                                    <label class="text-[10px] uppercase truncate block text-amber-600 dark:text-amber-400 font-bold mb-1" title="Bütünleme">BÜTÜNLEME</label>
                                    <input type="number" min="0" max="100" class="inp-but w-full p-2 bg-amber-50 dark:bg-amber-900/30 border border-amber-300 dark:border-amber-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-center shadow-inner transition" value="${c.butScore !== '' ? c.butScore : ''}">
                                </div>
                            `;
                        }

                        let isFailed = c.grade === 'FF' || c.grade === 'FD' || c.grade === 'DD' || c.grade === 'DC';
                        let gradeClass = isFailed ? "text-red-600 dark:text-red-400" : "text-green-600 dark:text-green-400";
                        rowHtml += `<div class="ml-2 w-12 text-center font-bold text-lg ${gradeClass} mt-4 md:mt-0">${c.grade || '-'}</div>`;
                    }

                    rowHtml += `
                        </div>
                        <div class="flex-shrink-0 ml-auto md:ml-0 mt-2 md:mt-0">
                            <button onclick="openSettingsModal(${idx}, ${s})" class="text-sm font-semibold text-comuBlue dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 px-3 py-2 rounded-lg border border-transparent hover:border-blue-200 dark:hover:border-blue-800 transition"><span class="md:hidden mr-1">⚙️</span>${t('btnSetting')}</button>
                        </div>
                    `;
                    row.innerHTML = rowHtml;
                    courseCont.appendChild(row);
                });
            }
            if (!hasData) {
                container.innerHTML = `<div class="text-center text-gray-500 dark:text-gray-400 py-8">Kayıtlı veri bulunamadı.</div>`;
            }
        }

        function saveTranscriptEdits() {
            saveTranscriptStateSilently();

            let hasError = false;
            let needsBut = false;

            for (let s = state.startSemester; s <= state.targetSemester; s++) {
                if (!state.history[s] || state.history[s].courses.length === 0) continue;

                const calcLogic = calculateSemesterLogic(state.history[s].courses, s, state.history, state.baseGano, state.baseCredits);

                if (calcLogic.anyFailed) {
                    needsBut = true;
                }

                state.history[s].courses.forEach(c => {
                    if (c.credit === '' || isNaN(c.credit) || c.credit <= 0) hasError = true;
                    if (c.mode === 'letter' && !c.grade) hasError = true;
                    if (c.mode === 'exam') {
                        if (c.finalScore === '') hasError = true;
                    }
                });
            }

            if (hasError) {
                showModal(t('errGano'), t('errRowCreditMsg'), true);
                return;
            }

            try {
                if (window.localStorage) {
                    localStorage.setItem('gano_state', JSON.stringify(state));
                }
            } catch (e) {}
            
            renderTranscript();

            if (needsBut) {
                showModal("Bütünleme", t('butunlemeFillMsg'), false, null, t('btnClose'));
                return;
            }

            const btnCalc = document.getElementById('btnRecalculate');
            const originalText = btnCalc.innerHTML;
            btnCalc.innerHTML = "✓";
            btnCalc.classList.replace('bg-amber-500', 'bg-green-500');
            
            setTimeout(() => {
                btnCalc.innerHTML = originalText;
                btnCalc.classList.replace('bg-green-500', 'bg-amber-500');
            }, 1000);
        }

        function printTranscript() {
            saveTranscriptEdits();
            
            let html = `<html><head><title>${t('title')} - Transcript</title><style>
                body { font-family: sans-serif; padding: 30px; color: #333; line-height: 1.6; max-width: 800px; margin: auto; }
                h2 { color: #003366; border-bottom: 3px solid #003366; padding-bottom: 10px; margin-bottom: 30px; text-align:center; }
                h3 { color: #444; margin-top: 30px; border-left: 4px solid #003366; padding-left: 10px; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
                th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
                th { background-color: #f8f9fa; font-weight: bold; color: #555; text-transform: uppercase; }
                .text-center { text-align: center; }
                .summary-box { background: #f0f7ff; padding: 12px; font-weight: bold; font-size: 14px; border: 1px solid #cce0ff; border-radius: 4px; margin-bottom: 30px; color: #003366; display: flex; justify-content: space-between; }
                .overall-box { background: #e6ffed; padding: 15px; font-weight: bold; font-size: 16px; border: 2px solid #b3e6c2; border-radius: 4px; margin-top: 40px; color: #006622; text-align: center; }
            </style></head><body>`;

            html += `<h2>${t('title')}</h2>`;
            const cType = state.creditType === 'akts' ? t('aktsTitle') : t('yerelTitle');

            let cumCrd = state.baseCredits;
            let cumPts = state.baseCredits * state.baseGano;

            for (let s = state.startSemester; s <= state.targetSemester; s++) {
                if (!state.history[s] || state.history[s].courses.length === 0) continue;
                html += `<h3>${t('semPrefix')}${s}${t('semSuffix')}</h3>`;
                html += `<table><tr><th>${t('colName')}</th><th class="text-center">${cType}</th><th class="text-center">${t('lblRaw')}</th><th class="text-center">${t('colGrade')}</th></tr>`;

                let semCrd = 0;
                let semPts = 0;
                
                state.history[s].courses.forEach(c => {
                    let rawDisp = c.mode === 'letter' ? '-' : c.raw || calculateCourseRaw(c);
                    html += `<tr><td>${c.name || '-'}</td><td class="text-center">${c.credit}</td><td class="text-center">${rawDisp}</td><td class="text-center">${c.grade}</td></tr>`;

                    if (c.isRepeated && c.prevGrade && GRADES[c.prevGrade] !== undefined) {
                        cumCrd -= c.credit;
                        cumPts -= c.credit * GRADES[c.prevGrade];
                    }

                    if (!c.isRepeated) {
                        semCrd += c.credit;
                        semPts += c.credit * GRADES[c.grade];
                    }

                    cumCrd += c.credit;
                    cumPts += c.credit * GRADES[c.grade];
                });
                
                html += `</table>`;

                let yano = semCrd > 0 ? (Math.round((semPts / semCrd) * 100) / 100).toFixed(2) : '-';
                let gano = cumCrd > 0 ? (Math.round((cumPts / cumCrd) * 100) / 100).toFixed(2) : '0.00';
                let ganoDispPrint = s === 1 ? "-" : gano;
                html += `<div class="summary-box"><span>${t('yano')}: ${yano}</span><span>${t('gano')}: ${ganoDispPrint}</span></div>`;
            }

            let finalGano = cumCrd > 0 ? (Math.round((cumPts / cumCrd) * 100) / 100).toFixed(2) : '0.00';
            html += `<div class="overall-box">Nihai ${t('gano')}: ${finalGano}</div>`;
            html += `</body></html>`;
            
            const win = window.open('', '', 'width=800,height=600');
            win.document.write(html);
            win.document.close();
            win.print();
        }

        function showInfo() {
            const btnCancel = `<button onclick="closeModal()" class="bg-gray-500 hover:bg-gray-600 active:transform active:scale-95 text-white font-bold py-2.5 px-8 rounded-xl transition-all shadow-sm">${t('btnClose')}</button>`;
            document.getElementById('modalFooter').innerHTML = btnCancel;
            showModal(t('infoTitle'), t('infoBody'), false, null, t('btnClose'));
        }

        function showModal(title, message, isError = false, actionCallback = null, actionText = t('btnClose')) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalBody').innerHTML = message;
            
            const header = document.getElementById('modalHeader');
            if (isError) {
                header.classList.remove('bg-comuBlue', 'dark:bg-blue-900');
                header.classList.add('bg-red-600', 'dark:bg-red-800');
            } else {
                header.classList.remove('bg-red-600', 'dark:bg-red-800');
                header.classList.add('bg-comuBlue', 'dark:bg-blue-900');
            }

            const btnHtml = `<button onclick="document.getElementById('modalActionBtnProxy').click()" class="${isError ? 'bg-red-600 hover:bg-red-800' : 'bg-comuBlue hover:bg-blue-800'} active:transform active:scale-95 text-white font-bold py-2.5 px-8 rounded-xl transition-all shadow-sm">${actionText}</button><button id="modalActionBtnProxy" class="hidden"></button>`;
            document.getElementById('modalFooter').innerHTML = btnHtml;

            document.getElementById('modalActionBtnProxy').onclick = () => {
                closeModal();
                if (actionCallback) actionCallback();
            };
            
            document.getElementById('customModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
        }
    </script>
</body>
</html>
